<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetworX 🌐</title>
    <link rel="icon" type="image/png" href="assets/icons/icon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Contact Us</h1>
    <p>"Have questions or need support? Send us a message and we’ll get back to you soon."</p>
    <form id="contactForm" action="/contact" method="POST">
        <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required maxlength="100" placeholder="Enter your name">
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>

        <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required placeholder="Type your message here"></textarea>
        </div>

        <div>
            <button type="submit">Send Message</button>
         </div> </form>
            <script src="js/script.js"></script>
        </body>
        </html>
